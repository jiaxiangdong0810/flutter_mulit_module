name: Android APK

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: Build flavor
        required: true
        default: prod
        type: choice
        options:
          - prod
          - beta

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --flavor ${{ inputs.flavor }} --dart-define=FLAVOR=${{ inputs.flavor }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.flavor }}-release
          path: build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-release.apk

      - name: Upload to Pgyer
        env:
          PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
          APK_PATH: build/app/outputs/flutter-apk/app-${{ inputs.flavor }}-release.apk
        run: |
          if [ -z "$PGYER_API_KEY" ]; then
            echo "PGYER_API_KEY secret is empty"
            exit 1
          fi

          response="$(curl --silent --show-error --fail-with-body https://upload.pgyer.com/apiv2/app/upload \
            -F "_api_key=${PGYER_API_KEY}" \
            -F "file=@${APK_PATH}" \
            -F "buildInstallType=1" \
            -F "buildUpdateDescription=${{ github.sha }}")"

          echo "$response"
          RESPONSE="$response" python3 - <<'PY'
          import json
          import os
          import sys

          data = json.loads(os.environ["RESPONSE"])
          if data.get("code") != 0:
              print(f"Pgyer upload failed: {data.get('message')}")
              sys.exit(1)

          shortcut = data.get("data", {}).get("buildShortcutUrl")
          if shortcut:
              print(f"Pgyer install URL: https://www.pgyer.com/{shortcut}")
          PY
